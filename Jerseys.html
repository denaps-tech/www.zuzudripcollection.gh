<!doctype html>
<html>
    <head>
        <title>Jerseys</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Boldonse&family=Bungee&family=Luckiest+Guy&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                margin: 0;
                background: #000;
                color: #fff;
                font-family: Arial;
                text-align: center;
            }

            h1 {
                padding-top: 66px;
                padding-bottom: 14px;
                color: red;
                font-size: 29px;
                font-family: "Bungee", sans-serif;
                font-weight: bolder;
                text-transform: uppercase;
            }
            p {
                padding-bottom: 23px;
                font-family: Georgia;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                padding: 40px;
            }

            .item img {
                width: 100%;
                height: 300px;
                object-fit: cover;
                border-radius: 10px;
            }

            @media (orientation: landscape) {
                .grid {
                    grid-template-columns: repeat(2, 1fr);
                    max-width: 1100px;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    margin: 0 auto;
                    padding: 20px;
                }

                body {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                }
            }

            @media (max-width: 900px) {
                .grid {
                    grid-template-columns: repeat(2, 1fr);
                }
                h1 {
                    padding-top: 66px;
                    color: red;
                    font-size: 34px;
                    font-family: "Bungee", sans-serif;
                    font-weight: bolder;
                    text-transform: uppercase;
                }
                p {
                    font-size: 28px;
                    font-family: Georgia;
                    padding-bottom: 17px;
                }
            }

            @media (max-width: 678px) {
                .grid {
                    grid-template-columns: 1fr;
                }
                h1 {
                    padding-top: 66px;
                    padding-bottom: 8px;
                    color: red;
                    font-size: 29px;
                    font-family: "Bungee", sans-serif;
                    font-weight: bolder;
                    text-transform: uppercase;
                }
                p {
                    font-size: 19px;
                    font-family: Georgia;
                    padding-bottom: 14px;
                }
                .logo {
                    font-size: 14px;
                }

                .back-btn {
                    padding: 6px 10px;
                    font-size: 12px;
                }

                .back-btn img {
                    width: 16px;
                    height: 16px;
                }
            }
            .buy-btn {
                padding: 10px 18px;
                background: gold;
                border: none;
                border-radius: 6px 6px 20px 20px;
                cursor: pointer;
                font-weight: bold;
                transition: 0.3s;
            }

            .buy-btn:hover {
                transform: scale(1.1);
                background: black;
                color: gold;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .main-header {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 60px;

                display: flex;
                align-items: center;
                justify-content: space-between;

                padding: 0 15px;
                background: rgba(0, 0, 0, 0.9);
                color: white;
                z-index: 1000;
            }

            /* BACK BUTTON */
            .back-btn {
                display: flex;
                align-items: center;
                gap: 6px;

                padding: 8px 12px;
                border: none;
                background: white;
                color: black;
                border-radius: 6px;
                cursor: pointer;
                transition: 0.3s;
            }

            .back-btn img {
                width: 18px;
                height: 18px;
            }

            .back-btn:hover {
                background: gold;
                transform: scale(1.05);
            }

            /* LOGO */
            .logo {
                font-size: 15px;
                font-weight: bold;
                letter-spacing: 1px;
                text-transform: uppercase;

                padding: 6px 12px;
                border-radius: 20px;

                background: linear-gradient(90deg, #c8a46b, #ffffff20);
                color: white;
            }
        </style>
    </head>

    <body>
        <header class="main-header">
            <button class="back-btn" onclick="goBack()">
                <img
                    src="https://cdn-icons-png.flaticon.com/512/93/93634.png"
                    alt="back"
                />
                Back
            </button>

            <h1 class="logo">My Fashion Store</h1>
        </header>

        <h1>Jerseys Collection</h1>
        <div class="grid">
            <div class="item">
                <img src="Ft1.jpeg" />

                <button class="buy-btn" onclick="buyNow(250)">
                    Buy GH₵250
                </button>
            </div>
            <br />
            <br />

            <div class="item">
                <img src="ft2.jpeg" />

                <button class="buy-btn" onclick="buyNow(240)">
                    Buy GH₵240
                </button>
            </div>
            <br />
            <br />

            <div class="item">
                <img src="ft4.jpeg" />

                <button class="buy-btn" onclick="buyNow(250)">
                    Buy GH₵250
                </button>
            </div>
            <br />
            <br />
            <div class="item">
                <img src="ft5.jpeg" />

                <button class="buy-btn" onclick="buyNow(300)">
                    Buy GH₵300
                </button>
            </div>
            <br />
            <br />
            <div class="item">
                <img src="ft6.jpeg" />

                <button class="buy-btn" onclick="buyNow(300)">
                    Buy GH₵300
                </button>
            </div>
            <br />
            <div class="item">
                <img src="ft7.jpeg" />

                <button class="buy-btn" onclick="buyNow(250)">
                    Buy GH₵250
                </button>
            </div>
        </div>
            <div
                style="
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                "
            >
                <h1>Please Note:</h1>
                <p style="font-size: 19px">
                    Prices are fixed therefore are non nagotiatable
                </p>
            </div>
        <script>
            function buyNow(price) {
                const phone = "233555358325"; // your WhatsApp number

                const message =
                    `Hello, I want to buy an item.\n\n` +
                    `💰 Price: GH₵${price}\n\n` +
                    `Please confirm availability.`;

                const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

                window.open(url, "_blank");
            }
            function goBack() {
                window.history.back();
            }
        </script>
    </body>
</html>
